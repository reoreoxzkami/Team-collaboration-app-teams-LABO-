    <!-- Flash-of-wrong-theme prevention: set .dark class before first paint -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("teams-labo-theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = s === "dark" || ((s === null || s === "system") && prefersDark);
          if (dark) document.documentElement.classList.add("dark");
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", dark ? "#0b0f1a" : "#7c3aed");
        } catch (e) {}
      })();
    </script>
